source = ~/.config/hypr/themes/mocha.conf

general {
	no_fade_in = false
	grace = 0
	disable_loading = true
}

background {
	monitor =
	path = /home/torumon/.config/hypr/wallpapers/wall_lock_1.png
	color = $base
	blur_passes = 2
	contrast = 0.8916
	brightness = 0.8172
	vibrancy = 0.1696
	vibrancy_darkness = 0.0
}

# TIME
label {
	monitor = DP-2
	text = $TIME
	color = $text
	font_size = 120
	font_family = JetBrainsMono Nerd Font Bold
	position = 0, -300
	halign = center
	valign = top
}

# USER
label {
	monitor = DP-2
	text = Hello, $USER
	color = $text
	font_size = 25
	font_family = JetBrainsMono Nerd Font
	position = 0, -40
	halign = center
	valign = center
}

# INPUT FIELD
input-field {
	monitor = DP-2
	size = 250, 60
	outline_thickness = 2
	dots_size = 0.2
	dots_spacing = 0.2
	dots_center = true
	outer_color = $accent
	inner_color = $base
	font_color = $text
	fade_on_empty = false
	placeholder_text = <i>Password...</i>
	hide_input = false
	position = 0, -120
	halign = center
	valign = center
	rounding = 20
}
